[tools]
node = "22"
pnpm = "10"

[tasks.dev]
run = "pnpm --filter web dev"

[tasks.build]
run = "pnpm --filter web build"

[tasks.test]
run = "pnpm -r test"

[tasks."worker:dev"]
run = "pnpm --filter worker dev"

[tasks."worker:deploy"]
run = "pnpm --filter worker exec wrangler deploy"

[tasks."gas:push"]
run = "pnpm --filter gas build && pnpm --filter gas push"

[tasks."gas:deploy"]
run = "pnpm --filter gas deploy"
